# Netlify deployment configuration for the react-pro-sidebar docs site.
#
# The docs site lives in `/website` and is built as a static Next.js export
# (Nextra v3 + nextra-theme-docs). The library itself is built first (so the
# `file:..` dependency resolves to a populated `dist/`) and then the Nextra app
# is exported to `website/out`.

[build]
  base    = "website"
  command = "cd .. && yarn install --frozen-lockfile && yarn build && cd website && yarn install --frozen-lockfile && yarn build"
  publish = "website/out"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--prefer-offline --no-audit --progress=false"

# Pretty URLs — trailingSlash is on in next.config.js, so requests for
# /docs/installation get rewritten to /docs/installation/index.html.
[[redirects]]
  from   = "/docs"
  to     = "/docs/installation"
  status = 301
  force  = false

# Cache hashed static assets aggressively, never cache the HTML.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
